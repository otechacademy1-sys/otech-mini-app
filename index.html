<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O'TECH Academy</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a1628, #1a2a4a);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            padding: 40px 20px;
            max-width: 400px;
        }
        .logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #2a4a7a;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #f0c040;
        }
        p {
            font-size: 16px;
            opacity: 0.8;
            margin-bottom: 30px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            background: #f0c040;
            color: #0a1628;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 12px;
        }
        .btn:hover {
            background: #d4a82e;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🎓</div>
        <h1>O'TECH Academy</h1>
        <p>Your AI-Powered High School Learning Platform</p>
        <button class="btn" onclick="startLearning()">Start Learning</button>
    </div>

    <script>
    const tg = window.Telegram.WebApp;
    tg.ready();

    function startLearning() {
        alert("Button clicked! Sending data...");
        tg.sendData("start_learning");
        tg.close();
    }
</script>
</body>
</html>
