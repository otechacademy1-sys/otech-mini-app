<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O'TECH Academy</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a1628;
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 1px solid #2a3a5a;
            margin-bottom: 20px;
        }
        .header h1 { font-size: 24px; color: #f0c040; }
        .header p { font-size: 14px; opacity: 0.7; margin-top: 5px; }
        .btn-grid { display: grid; gap: 12px; }
        .btn {
            background: #1a2a4a;
            color: white;
            border: 1px solid #2a3a5a;
            border-radius: 12px;
            padding: 16px;
            font-size: 16px;
            cursor: pointer;
            text-align: left;
        }
        .btn:hover { background: #2a3a5a; }
        .btn.primary { background: #f0c040; color: #0a1628; font-weight: bold; border: none; }
        .btn.primary:hover { background: #d4a82e; }
        .back-btn { background: transparent; border: 1px solid #2a3a5a; color: #aaa; margin-top: 20px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="screen-grades">
        <div class="header">
            <h1>O'TECH Academy</h1>
            <p>Choose your grade</p>
        </div>
        <div class="btn-grid">
            <button class="btn" onclick="selectGrade('grade9')">⭐ GRADE 9</button>
            <button class="btn" onclick="selectGrade('grade10')">💫 GRADE 10</button>
            <button class="btn" onclick="selectGrade('grade11')">✨ GRADE 11</button>
        </div>
    </div>

    <div id="screen-subjects" class="hidden">
        <div class="header">
            <h1 id="subject-header">Subjects</h1>
            <p>Choose a subject</p>
        </div>
        <div id="subject-buttons" class="btn-grid"></div>
        <button class="btn back-btn" onclick="goBackToGrades()">← Back to Grades</button>
    </div>

    <div id="screen-chapters" class="hidden">
        <div class="header">
            <h1 id="chapter-header">Chapters</h1>
            <p>Choose a chapter</p>
        </div>
        <div id="chapter-buttons" class="btn-grid"></div>
        <button class="btn back-btn" onclick="goBackToSubjects()">← Back to Subjects</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const grades = {
            grade9: {
                name: "⭐ GRADE 9",
                subjects: {
                    physics: "📘 PHYSICS",
                    chemistry: "🧪 CHEMISTRY",
                    mathematics: "📐 MATHEMATICS",
                    english: "📖 ENGLISH",
                    history: "🏛 HISTORY",
                    geography: "🌍 GEOGRAPHY",
                    biology: "🧬 BIOLOGY",
                    ict: "💻 ICT",
                    civics: "🕌 CIVICS",
                    economics: "💰 ECONOMICS",
                    amharic: "🗣 AMHARIC",
                    hpe: "🏃 HPE"
                }
            },
            grade10: {
                name: "💫 GRADE 10",
                subjects: {
                    physics: "📘 PHYSICS",
                    chemistry: "🧪 CHEMISTRY",
                    mathematics: "📐 MATHEMATICS",
                    english: "📖 ENGLISH",
                    history: "🏛 HISTORY",
                    geography: "🌍 GEOGRAPHY",
                    biology: "🧬 BIOLOGY",
                    ict: "💻 ICT",
                    civics: "🕌 CIVICS",
                    economics: "💰 ECONOMICS",
                    amharic: "🗣 AMHARIC",
                    hpe: "🏃 HPE"
                }
            },
            grade11: {
                name: "✨ GRADE 11",
                streams: {
                    natural: {
                        name: "🔬 NATURAL SCIENCE",
                        subjects: {
                            physics: "📘 PHYSICS",
                            chemistry: "🧪 CHEMISTRY",
                            mathematics: "📐 MATHEMATICS",
                            biology: "🧬 BIOLOGY",
                            english: "📖 ENGLISH",
                            ict: "💻 ICT"
                        }
                    },
                    social: {
                        name: "📚 SOCIAL SCIENCE",
                        subjects: {
                            history: "🏛 HISTORY",
                            geography: "🌍 GEOGRAPHY",
                            economics: "💰 ECONOMICS",
                            civics: "🕌 CIVICS",
                            english: "📖 ENGLISH",
                            amharic: "🗣 AMHARIC"
                        }
                    }
                }
            }
        };

        let currentGrade = null;
        let currentStream = null;
        let currentSubject = null;

        function selectGrade(gradeId) {
            currentGrade = gradeId;
            const grade = grades[gradeId];
            document.getElementById('screen-grades').classList.add('hidden');
            if (grade.streams) {
                showStreamSelection(grade);
            } else {
                showSubjectSelection(grade.subjects, grade.name);
            }
        }

        function showStreamSelection(grade) {
            const screen = document.getElementById('screen-subjects');
            document.getElementById('subject-header').textContent = grade.name;
            const container = document.getElementById('subject-buttons');
            container.innerHTML = '';
            for (const [streamId, stream] of Object.entries(grade.streams)) {
                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.textContent = stream.name;
                btn.onclick = () => {
                    currentStream = streamId;
                    showSubjectSelection(stream.subjects, stream.name);
                };
                container.appendChild(btn);
            }
            screen.classList.remove('hidden');
        }

        function showSubjectSelection(subjects, title) {
            const screen = document.getElementById('screen-subjects');
            document.getElementById('subject-header').textContent = title;
            const container = document.getElementById('subject-buttons');
            container.innerHTML = '';
            for (const [subjId, subjName] of Object.entries(subjects)) {
                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.textContent = subjName;
                btn.onclick = () => selectSubject(subjId, subjName);
                container.appendChild(btn);
            }
            screen.classList.remove('hidden');
            document.getElementById('screen-chapters').classList.add('hidden');
        }

        function selectSubject(subjectId, subjectName) {
            currentSubject = subjectId;
            const chapters = ["Chapter 1", "Chapter 2", "Chapter 3", "Chapter 4", "Chapter 5"];
            const screen = document.getElementById('screen-chapters');
            document.getElementById('chapter-header').textContent = subjectName;
            const container = document.getElementById('chapter-buttons');
            container.innerHTML = '';
            chapters.forEach((ch, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.textContent = ch;
                btn.onclick = () => selectChapter(index + 1);
                container.appendChild(btn);
            });
            document.getElementById('screen-subjects').classList.add('hidden');
            screen.classList.remove('hidden');
        }

        function selectChapter(chapterNum) {
            let data = `${currentGrade}_${currentSubject}_ch${chapterNum}`;
            if (currentStream) data += `_${currentStream}`;
            tg.sendData(data);
            tg.close();
        }

        function goBackToGrades() {
            document.getElementById('screen-subjects').classList.add('hidden');
            document.getElementById('screen-chapters').classList.add('hidden');
            document.getElementById('screen-grades').classList.remove('hidden');
            currentStream = null;
            currentSubject = null;
        }

        function goBackToSubjects() {
            document.getElementById('screen-chapters').classList.add('hidden');
            if (currentGrade) {
                const grade = grades[currentGrade];
                if (grade.streams) {
                    showStreamSelection(grade);
                } else {
                    showSubjectSelection(grade.subjects, grade.name);
                }
            }
        }
    </script>
</body>
</html>
